<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">ShopGrid</a>
    <nav class="nav-actions" aria-label="Primary navigation">
      <a class="nav-link" href="index.html">Products</a>
      <a class="cart-link active" href="cart.html" aria-label="Open cart">
        Cart <span id="cartCount">0</span>
      </a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="cart-header">
      <div>
        <p class="eyebrow">Checkout</p>
        <h1>Your Cart</h1>
      </div>
      <button id="clearCartBtn" class="ghost-button" type="button">Clear cart</button>
    </section>

    <section class="cart-layout">
      <div id="cartItems" class="cart-items" aria-live="polite"></div>
      <aside class="summary-panel" aria-label="Bill summary">
        <h2>Bill Summary</h2>
        <div class="summary-row">
          <span>Subtotal</span>
          <strong id="subtotal">$0.00</strong>
        </div>
        <div class="summary-row">
          <span>Discount</span>
          <strong id="discount">$0.00</strong>
        </div>
        <div class="summary-row">
          <span>Tax</span>
          <strong id="tax">$0.00</strong>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <strong id="shipping">$0.00</strong>
        </div>
        <div class="summary-total">
          <span>Total</span>
          <strong id="grandTotal">$0.00</strong>
        </div>
        <button class="primary-button full-width" type="button">Proceed to Checkout</button>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
